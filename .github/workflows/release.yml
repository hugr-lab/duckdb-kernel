name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          SUFFIX=""
          if [ "$GOOS" = "windows" ]; then SUFFIX=".exe"; fi
          OUTPUT="duckdb-kernel-${GOOS}-${GOARCH}${SUFFIX}"
          go build -tags duckdb_arrow -o "$OUTPUT" ./cmd/duckdb-kernel

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: duckdb-kernel-*

  build-perspective:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jupyterlab>=4
      - run: cd extensions/jupyterlab && jlpm install && jlpm build
      - name: Package Perspective static files
        run: |
          mkdir -p static/perspective
          cp extensions/jupyterlab/hugr_perspective/labextension/static/perspective/* static/perspective/
          tar -czf perspective-static.tar.gz -C . static/perspective
      - uses: actions/upload-artifact@v4
        with:
          name: perspective-static
          path: perspective-static.tar.gz

  build-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd extensions/vscode
          npm pkg set version="$VERSION"

      - run: cd extensions/vscode && npm install && npm run build

      - name: Package VSIX
        run: cd extensions/vscode && npx @vscode/vsce package --no-dependencies -o hugr-result-renderer.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vscode-vsix
          path: extensions/vscode/hugr-result-renderer.vsix

  publish-vscode:
    needs: build-vscode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vscode-vsix
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath hugr-result-renderer.vsix || echo "Publish skipped (version may already exist)"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  release:
    needs: [build-binaries, build-perspective, build-vscode]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          # Collect binaries
          for d in artifacts/binary-*; do
            cp "$d"/* release/ 2>/dev/null || true
          done
          # Perspective static
          cp artifacts/perspective-static/perspective-static.tar.gz release/
          # VS Code extension
          cp artifacts/vscode-vsix/hugr-result-renderer.vsix release/
          # kernel.json
          cp kernel/kernel.json release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
