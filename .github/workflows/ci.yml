name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build (unix)
        if: runner.os != 'Windows'
        run: go build -tags duckdb_arrow -o duckdb-kernel ./cmd/duckdb-kernel

      - name: Build (windows)
        if: runner.os == 'Windows'
        run: go build -tags duckdb_arrow -o duckdb-kernel.exe ./cmd/duckdb-kernel

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install kernel (macOS)
        if: runner.os == 'macOS'
        run: |
          KERNEL_DIR="$HOME/Library/Jupyter/kernels/duckdb"
          mkdir -p "$KERNEL_DIR"
          ln -sf "$(pwd)/duckdb-kernel" "$KERNEL_DIR/duckdb-kernel"
          cp kernel/kernel.json "$KERNEL_DIR/kernel.json"
          sed -i '' "s|\"duckdb-kernel\"|\"$KERNEL_DIR/duckdb-kernel\"|" "$KERNEL_DIR/kernel.json"

      - name: Install kernel (Linux)
        if: runner.os == 'Linux'
        run: |
          KERNEL_DIR="$HOME/.local/share/jupyter/kernels/duckdb"
          mkdir -p "$KERNEL_DIR"
          cp duckdb-kernel "$KERNEL_DIR/duckdb-kernel"
          cp kernel/kernel.json "$KERNEL_DIR/kernel.json"
          sed -i "s|\"duckdb-kernel\"|\"$KERNEL_DIR/duckdb-kernel\"|" "$KERNEL_DIR/kernel.json"

      - name: Install kernel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $KernelDir = "$env:APPDATA\jupyter\kernels\duckdb"
          New-Item -ItemType Directory -Force -Path $KernelDir
          Copy-Item duckdb-kernel.exe "$KernelDir\duckdb-kernel.exe"
          Copy-Item kernel\kernel.json "$KernelDir\kernel.json"
          $json = Get-Content "$KernelDir\kernel.json" | ConvertFrom-Json
          $json.argv[0] = "$KernelDir\duckdb-kernel.exe"
          $json | ConvertTo-Json -Depth 10 | Set-Content "$KernelDir\kernel.json"

      - name: Install test dependencies
        run: pip install jupyter_client pyzmq pytest

      - name: Run integration tests
        run: python -m pytest tests/integration_test.py -v
