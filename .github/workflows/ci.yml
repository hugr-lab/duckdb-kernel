name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build -tags duckdb_arrow -o duckdb-kernel ./cmd/duckdb-kernel
        shell: bash
      - run: go test -tags duckdb_arrow ./...
        shell: bash

  build-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: cd extensions/vscode && npm install && npm run build
      - run: test -f extensions/vscode/out/renderer.js

  build-jupyterlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jupyterlab>=4
      - run: cd extensions/jupyterlab && jlpm install && jlpm build
      - run: test -d extensions/jupyterlab/hugr_perspective/labextension/static
